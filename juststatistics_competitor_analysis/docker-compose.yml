# docker-compose.yml
# n8n self-hosted + PostgreSQL for JustStatistics Competitor Intelligence Engine
# Data sovereignty: all data stays on VPS — no cloud n8n, no external logging
#
# Prerequisites:
#   cp .env.example .env && fill all values
#   docker compose up -d
#
# With nginx SSL (optional):
#   docker compose --profile nginx up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_NON_ROOT_USER: ${POSTGRES_NON_ROOT_USER}
      POSTGRES_NON_ROOT_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_internal
    # Port 5432 NOT exposed — internal network only

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_NON_ROOT_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}

      # n8n core
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${WEBHOOK_URL}

      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      # Execution settings
      EXECUTIONS_PROCESS: main
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"    # Reduce PostgreSQL write volume
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      EXECUTIONS_DATA_MAX_AGE: 336                 # Keep 2 weeks of execution history

      # Data sovereignty — disable all external telemetry
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""

      # Timezone
      GENERIC_TIMEZONE: Europe/Copenhagen
      TZ: Europe/Copenhagen

      # Binary data storage (for image handling)
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_STORAGE_PATH: /home/node/.n8n/binaryData

    ports:
      - "127.0.0.1:5678:5678"    # Localhost only — expose via nginx or Caddy
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_binary:/home/node/.n8n/binaryData
    networks:
      - n8n_internal
      - n8n_external
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Optional nginx reverse proxy with SSL termination
  # Remove/ignore if using Caddy or Traefik at the host level
  # Start with: docker compose --profile nginx up -d
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/n8n.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro    # Mount Let's Encrypt certs here
      - nginx_logs:/var/log/nginx
    networks:
      - n8n_external
    profiles:
      - nginx

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  n8n_binary:
    driver: local
  nginx_logs:
    driver: local

networks:
  n8n_internal:
    driver: bridge
    internal: true    # PostgreSQL unreachable from outside Docker network
  n8n_external:
    driver: bridge
